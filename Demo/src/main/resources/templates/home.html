<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生信息管理系统</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="system-title">学生信息管理系统</div>
                <div class="system-subtitle">Student Affairs Office</div>
            </div>
            
            <div th:if="${error}" class="error-message" th:text="${error}"></div>
            
            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input name="username" type="text" class="form-input" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input name="password" type="password" class="form-input" placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="btn btn-primary">登录</button>
                <p>还没有账号？<a th:href="@{/auth/register}">点击这里注册</a></p>
            </form>
        </div>
    </div>
</body>
</html>
